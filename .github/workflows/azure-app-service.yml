# Deploy Node.js app to Azure Web App (Linux).
# 1. Create a Web App (Node 20 LTS) in Azure Portal.
# 2. Configuration → Application settings: set DATABASE_URL (Azure Database for PostgreSQL connection string).
# 3. Download publish profile from the Web App → Get publish profile; add file contents as repo secret AZURE_WEBAPP_PUBLISH_PROFILE.
# 4. Add repository secret AZURE_WEBAPP_NAME with the Web App name (same as in Azure Portal).

name: Azure App Service

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  CI: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install and build
        run: |
          npm install
          npm run build

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
